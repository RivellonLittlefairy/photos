services:
  mongo:
    image: mongo:7
    container_name: timeline-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: timeline_web
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: timeline-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: timeline_web
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/apps/server/uploads

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: timeline-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mongo_data:
  uploads_data:
